name: Split addon branch
on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Split addons/ui_widget into addon branch
        run: |
          git subtree split --prefix=addons/ui_widget -b addon
          git push origin addon --force
